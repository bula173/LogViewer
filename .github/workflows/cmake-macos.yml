name: macOS CI (clang)

on:
  push:
    branches: [ "main","qt" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: macos-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]

    env:
      BUILD_DIR: ${{ github.workspace }}/build
      CMAKE_GENERATOR: Ninja
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      GTEST_COLOR: 1

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            ~/Library/Caches/pip
          key: brew-${{ runner.os }}-${{ hashFiles('**/Brewfile.lock.json') }}
          restore-keys: brew-${{ runner.os }}-

      - name: Install dependencies (Homebrew)
        run: |
          brew update
          brew install ninja ccache expat cppcheck libssh libarchive zip eigen boost
          brew install qt

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-clang-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-clang-${{ matrix.build_type }}-
            ccache-macos-clang-

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/_deps
          key: fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-

      - name: Toolchain info
        run: |
          which clang++
          clang++ --version

      - name: Configure
        run: |
          cmake -B "$BUILD_DIR" -S "$GITHUB_WORKSPACE" \
            -G "$CMAKE_GENERATOR" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=/usr/bin/clang \
            -DCMAKE_CXX_COMPILER=/usr/bin/clang++ \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_MESSAGE_LOG_LEVEL=WARNING \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DLibArchive_ROOT=$(brew --prefix libarchive) \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt)

      - name: Build
        run: |
          mkdir -p dist/logs
          cmake --build "$BUILD_DIR" --config ${{ matrix.build_type }} 2>&1 | tee dist/logs/build-${{ matrix.build_type }}.log

      - name: Run Code Quality Tools
        if: matrix.build_type == 'Debug'
        continue-on-error: true
        run: |
          # Ensure logs directory exists
          mkdir -p dist/logs
          
          # Run cppcheck analysis
          echo "Running cppcheck..."
          cmake --build --preset macos-cppcheck 2>&1 | tee dist/logs/cppcheck.log || true
          
          # Run clang-tidy if available
          if command -v clang-tidy &> /dev/null; then
            echo "Running clang-tidy..."
            cmake --build --preset macos-clang-tidy 2>&1 | tee dist/logs/clang-tidy.log || true
          fi

      - name: List tests
        working-directory: ${{ env.BUILD_DIR }}
        run: ctest -N || true

      - name: Run tests
        if: github.event_name == 'push'
        working-directory: ${{ env.BUILD_DIR }}
        run: ./tests/bin/LogViewer_tests

      - name: Install (staging)
        if: matrix.build_type == 'Release'
        run: |
          cmake --install "$BUILD_DIR" --config Release --prefix "$BUILD_DIR/_staging"

      - name: Verify CPack config
        if: matrix.build_type == 'Release'
        run: test -f "$BUILD_DIR/CPackConfig.cmake"

      - name: Package (CPack TGZ)
        if: matrix.build_type == 'Release'
        run: |
          cd "$BUILD_DIR"
          cpack -G TGZ -C Release

      - name: Move packages to dist
        if: matrix.build_type == 'Release'
        run: |
          mkdir -p dist/packages
          find "$BUILD_DIR" -maxdepth 1 -type f -name "*.tar.gz" -exec mv {} dist/packages/ \;
          ls -lh dist/packages/

      - name: Collect plugins
        if: matrix.build_type == 'Release'
        run: |
          echo "Listing plugins in build directory:"
          ls -lh "$BUILD_DIR/plugins/" || echo "plugins not found"
          echo "Plugin zip files:"
          find "$BUILD_DIR/plugins" -maxdepth 1 -type f -name "*.zip" || echo "No plugin zips found"

      - name: Upload plugins
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.build_type }}-plugins
          path: ${{ env.BUILD_DIR }}/plugins/*.zip
          if-no-files-found: warn

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.build_type }}-artifacts
          path: |
            dist/staging/**
            dist/packages/*.tar.gz
            ${{ env.BUILD_DIR }}/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.build_type }}-logs
          path: |
            dist/logs/**
          if-no-files-found: ignore
