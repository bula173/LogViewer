name: macOS CI (clang)

on:
  push:
    branches: [ "main","qt" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: macos-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        gui_framework: [wx, qt]

    env:
      BUILD_DIR: ${{ github.workspace }}/build
      CMAKE_GENERATOR: Ninja
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      GTEST_COLOR: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Homebrew)
        run: |
          brew update
          brew install ninja ccache expat cppcheck
          ${{ matrix.gui_framework == 'wx' && 'brew install wxwidgets' || '' }}
          ${{ matrix.gui_framework == 'qt' && 'brew install qt' || '' }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-clang-${{ matrix.build_type }}-${{ matrix.gui_framework }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-clang-${{ matrix.build_type }}-${{ matrix.gui_framework }}-
            ccache-macos-clang-${{ matrix.build_type }}-
            ccache-macos-clang-

      - name: Toolchain info
        run: |
          which clang++
          clang++ --version
          ${{ matrix.gui_framework == 'wx' && 'wx-config --version' || 'echo "Qt build - skipping wx-config"' }}

      - name: Configure
        run: |
          # Determine framework-specific settings
          if [ "${{ matrix.gui_framework }}" = "wx" ]; then
            GUI_FRAMEWORK="WX"
            EXTRA_ARGS=""
          else
            GUI_FRAMEWORK="QT"
            EXTRA_ARGS="-DCMAKE_PREFIX_PATH=$(brew --prefix qt)"
          fi
          
          cmake -B "$BUILD_DIR-${{ matrix.gui_framework }}" -S "$GITHUB_WORKSPACE" \
            -G "$CMAKE_GENERATOR" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=/usr/bin/clang \
            -DCMAKE_CXX_COMPILER=/usr/bin/clang++ \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DGUI_FRAMEWORK="$GUI_FRAMEWORK" \
            $EXTRA_ARGS

      - name: Build
        run: |
          cmake --build "$BUILD_DIR-${{ matrix.gui_framework }}" --config ${{ matrix.build_type }} 2>&1 | tee dist/logs/build-${{ matrix.gui_framework }}-${{ matrix.build_type }}.log

      - name: Run Code Quality Tools
        if: matrix.build_type == 'Debug'
        continue-on-error: true
        run: |
          # Ensure logs directory exists
          mkdir -p dist/logs
          
          # Run cppcheck analysis
          echo "Running cppcheck..."
          cmake --build --preset macos-cppcheck 2>&1 | tee dist/logs/cppcheck-${{ matrix.gui_framework }}.log || true
          
          # Run clang-tidy if available
          if command -v clang-tidy &> /dev/null; then
            echo "Running clang-tidy..."
            cmake --build --preset macos-clang-tidy 2>&1 | tee dist/logs/clang-tidy-${{ matrix.gui_framework }}.log || true
          fi

      - name: List tests
        working-directory: ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}
        run: ctest -N || true

      - name: Run tests
        working-directory: ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}
        run: ctest -j"$(sysctl -n hw.logicalcpu)" --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Install (staging)
        if: matrix.build_type == 'Release'
        run: |
          cmake --install "$BUILD_DIR-${{ matrix.gui_framework }}" --config Release --prefix "$BUILD_DIR-${{ matrix.gui_framework }}/_staging"

      - name: Verify CPack config
        if: matrix.build_type == 'Release'
        run: test -f "$BUILD_DIR-${{ matrix.gui_framework }}/CPackConfig.cmake"

      - name: Package (CPack DMG)
        if: matrix.build_type == 'Release'
        run: cmake --build "$BUILD_DIR-${{ matrix.gui_framework }}" --config Release --target package_${{ matrix.gui_framework }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.build_type }}-${{ matrix.gui_framework }}-artifacts
          path: |
            ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}/_staging/**
            ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}/_CPack_Packages/*/DragNDrop/*.dmg
            ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.build_type }}-${{ matrix.gui_framework }}-logs
          path: |
            dist/logs/**
          if-no-files-found: ignore
