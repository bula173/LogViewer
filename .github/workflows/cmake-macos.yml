name: macOS CI (clang)

on:
  push:
    branches: [ "main", "qt" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: macos-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]

    env:
      BUILD_DIR: ${{ github.workspace }}/build
      CMAKE_GENERATOR: Ninja
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      GTEST_COLOR: 1

    steps:
      - uses: actions/checkout@v4

      # Cache Homebrew downloads — key on Brewfile or workflow file so cache
      # is invalidated when package list changes
      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            /usr/local/Homebrew
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/cmake-macos.yml') }}
          restore-keys: brew-${{ runner.os }}-

      - name: Install dependencies (Homebrew)
        run: |
          brew update --quiet
          brew install ninja ccache expat cppcheck libssh libarchive qt || true

      # Key on source hashes — reused across commits, invalidated on real changes
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-clang-${{ matrix.build_type }}-${{ hashFiles('src/**/*.cpp', 'src/**/*.hpp', 'CMakeLists.txt') }}
          restore-keys: |
            ccache-macos-clang-${{ matrix.build_type }}-
            ccache-macos-clang-

      # Include thirdparty hashes so cache invalidates when dependency versions change
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/_deps
          key: fetchcontent-macos-${{ hashFiles('CMakeLists.txt', 'thirdparty/**/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-macos-
            fetchcontent-

      - name: Toolchain info
        run: |
          clang++ --version
          ccache --version
          cmake --version
          ninja --version

      - name: Configure
        run: |
          cmake -B "$BUILD_DIR" -S "$GITHUB_WORKSPACE" \
            -G "$CMAKE_GENERATOR" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=/usr/bin/clang \
            -DCMAKE_CXX_COMPILER=/usr/bin/clang++ \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_MESSAGE_LOG_LEVEL=WARNING \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DLibArchive_ROOT=$(brew --prefix libarchive) \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt)

      - name: Build
        run: |
          mkdir -p dist/logs
          cmake --build "$BUILD_DIR" --parallel 2>&1 | tee dist/logs/build-${{ matrix.build_type }}.log

      - name: Print ccache stats
        run: ccache --show-stats

      - name: Run Code Quality Tools
        if: matrix.build_type == 'Debug'
        continue-on-error: true
        run: |
          mkdir -p dist/logs

          echo "Running cppcheck..."
          cmake --build "$BUILD_DIR" --target cppcheck 2>&1 | tee dist/logs/cppcheck.log || true

          if command -v clang-tidy &> /dev/null; then
            echo "Running clang-tidy..."
            cmake --build "$BUILD_DIR" --target clang-tidy 2>&1 | tee dist/logs/clang-tidy.log || true
          fi

      - name: List available tests
        working-directory: ${{ env.BUILD_DIR }}
        run: ctest -N || true

      - name: Run tests
        id: run-tests
        run: |
          TEST_BIN="${{ env.BUILD_DIR }}/tests/bin/LogViewer_tests"
          if [ ! -f "$TEST_BIN" ]; then
            echo "Test binary not found, searching..."
            find "${{ env.BUILD_DIR }}" -name "LogViewer_tests" -type f
            exit 1
          fi
          mkdir -p dist/test-results
          "$TEST_BIN" --gtest_output="xml:dist/test-results/results.xml"

      # Annotate PRs with test failures directly in the diff view
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/macos@v2
        if: always()
        with:
          files: dist/test-results/*.xml
          comment_mode: always
          check_name: "Test Results (macOS clang)"

      - name: Install (staging)
        if: matrix.build_type == 'Release'
        run: cmake --install "$BUILD_DIR" --config Release --prefix "$BUILD_DIR/_staging"

      - name: Verify CPack config
        if: matrix.build_type == 'Release'
        run: test -f "$BUILD_DIR/CPackConfig.cmake"

      - name: Package (CPack TGZ)
        if: matrix.build_type == 'Release'
        run: |
          cd "$BUILD_DIR"
          cpack -G TGZ -C Release

      - name: Move packages to dist
        if: matrix.build_type == 'Release'
        run: |
          mkdir -p dist/packages
          find "$BUILD_DIR" -maxdepth 1 -type f -name "*.tar.gz" -exec mv {} dist/packages/ \;
          ls -lh dist/packages/

      - name: Upload plugins
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.build_type }}-plugins
          path: ${{ env.BUILD_DIR }}/plugins/*.zip
          if-no-files-found: warn

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.build_type }}-artifacts
          path: |
            dist/staging/**
            dist/packages/*.tar.gz
            dist/test-results/**
            ${{ env.BUILD_DIR }}/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.build_type }}-logs
          path: dist/logs/**
          if-no-files-found: ignore

      - name: Build summary
        if: always()
        run: |
          echo "## macOS Build (clang / ${{ matrix.build_type }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.run-tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ccache stats:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache --show-stats >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
