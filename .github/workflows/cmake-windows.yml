name: Windows CI (MSYS2 / clang)

on:
  push:
    branches: [ "main", "qt" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pages: write
  actions: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        gui_framework: [qt]

    env:
      BUILD_DIR: ${{ github.workspace }}\build
      CMAKE_GENERATOR: Ninja
      CCACHE_DIR: ${{ github.workspace }}\.ccache
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      GTEST_COLOR: 1
      GUI_FRAMEWORK: ${{ matrix.gui_framework }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-expat
            mingw-w64-x86_64-gtest
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-libtiff
            mingw-w64-x86_64-cppcheck
            mingw-w64-x86_64-nsis
            mingw-w64-x86_64-libssh
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-eigen3
            mingw-w64-x86_64-boost
            tar


      - name: Toolchain info
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          clang++ --version

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-win-clang-${{ matrix.build_type }}-${{ matrix.gui_framework }}-${{ github.sha }}
          restore-keys: |
            ccache-win-clang-${{ matrix.build_type }}-${{ matrix.gui_framework }}-
            ccache-win-clang-${{ matrix.build_type }}-
            ccache-win-clang-

      - name: Configure (CMake)
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          
          # Determine framework-specific settings
          if [ "${{ matrix.gui_framework }}" = "wx" ]; then
            GUI_FRAMEWORK="WX"
            EXTRA_ARGS="-DwxWidgets_CONFIG_EXECUTABLE=/mingw64/bin/wx-config"
          else
            GUI_FRAMEWORK="QT"
            EXTRA_ARGS="-DQt6_DIR=/mingw64/lib/cmake/Qt6"
          fi
          
          cmake -B "$BUILD_DIR-${{ matrix.gui_framework }}" -S "$GITHUB_WORKSPACE" \
                -G "$CMAKE_GENERATOR" \
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -DCMAKE_C_COMPILER="$(cygpath -m /mingw64/bin/clang.exe)" \
                -DCMAKE_CXX_COMPILER="$(cygpath -m /mingw64/bin/clang++.exe)" \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DCMAKE_PREFIX_PATH=/mingw64 \
                -DGUI_FRAMEWORK="$GUI_FRAMEWORK" \
                -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                $EXTRA_ARGS

      - name: Build
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          mkdir -p dist/logs
          cmake --build "$BUILD_DIR-${{ matrix.gui_framework }}" --config ${{ matrix.build_type }} 2>&1 | tee dist/logs/build-qt-${{ matrix.build_type }}.log

      - name: Run Code Quality Tools
        if: matrix.build_type == 'Debug'
        shell: msys2 {0}
        continue-on-error: true
        run: |
          export PATH="/mingw64/bin:$PATH"
          mkdir -p dist/logs
          echo "Running cppcheck..."
          cppcheck \
            --enable=warning,performance,portability \
            --inline-suppr \
            --suppress=normalCheckLevelMaxBranches \
            --template=gcc \
            -I src -I include \
            src 2> dist/logs/cppcheck-report.txt || true
          echo "---- cppcheck report ----"
          cat dist/logs/cppcheck-report.txt || true
          echo "-------------------------"

      - name: Run tests
        shell: msys2 {0}
        working-directory: ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}
        run: |
          export PATH="/mingw64/bin:$PATH"
          ctest -j"$(nproc)" --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Install (staging)
        shell: msys2 {0}
        run: cmake --install "$BUILD_DIR-${{ matrix.gui_framework }}" --config ${{ matrix.build_type }} --prefix "$BUILD_DIR-${{ matrix.gui_framework }}/_staging"

      - name: run CPack NSIS directly
        shell: msys2 {0}
        working-directory: ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cpack -G NSIS -C ${{ matrix.build_type }} --config CPackConfig.cmake

      - name: Collect plugins
        if: matrix.build_type == 'Release'
        shell: msys2 {0}
        run: |
          echo "Listing plugins in build directory:"
          ls -lh "$BUILD_DIR-${{ matrix.gui_framework }}/plugins/" || echo "plugins not found"
          echo "Plugin zip files:"
          find "$BUILD_DIR-${{ matrix.gui_framework }}/plugins" -maxdepth 1 -type f -name "*.zip" || echo "No plugin zips found"

      - name: Upload plugins
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.build_type }}-${{ matrix.gui_framework }}-plugins
          path: ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}/plugins/*.zip
          if-no-files-found: warn

      - name: Upload tests artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.build_type }}-${{ matrix.gui_framework }}-tests
          path: |
            ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}\Testing\Temporary\LastTest.log
            ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}\tests\bin\LogViewer_tests.exe
          if-no-files-found: ignore

      - name: Upload staging artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
            name: windows-${{ matrix.build_type }}-${{ matrix.gui_framework }}-staging
            path: dist/staging/**
            if-no-files-found: ignore

      - name: Upload installer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.build_type }}-${{ matrix.gui_framework }}-installer
          path: dist/packages/*.exe
          if-no-files-found: warn

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.build_type }}-${{ matrix.gui_framework }}-logs
          path: |
            dist/logs/**
          if-no-files-found: ignore

      - name: List CPack staging
        shell: msys2 {0}
        run: ls -lhR "$BUILD_DIR-${{ matrix.gui_framework }}/_staging"
