name: Windows CI (MSYS2 / clang)

on:
  push:
    branches: [ "main", "qt" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — only escalate what's actually needed
permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]

    env:
      BUILD_DIR: ${{ github.workspace }}\build
      CMAKE_GENERATOR: Ninja
      CCACHE_DIR: ${{ github.workspace }}\.ccache
      GTEST_COLOR: 1
      GUI_FRAMEWORK: QT

    steps:
      - uses: actions/checkout@v4

      # msys2/setup-msys2 has its own internal caching via cache: true.
      # We add an outer cache keyed on the workflow file so the full MSYS2
      # installation is reused across runs when the package list hasn't changed.
      - name: Cache MSYS2 installation
        uses: actions/cache@v4
        with:
          path: C:\msys64
          key: msys2-${{ hashFiles('.github/workflows/cmake-windows.yml') }}
          restore-keys: msys2-

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            base-devel
            git
            zip
            tar
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-charts
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-libtiff
            mingw-w64-x86_64-cppcheck
            mingw-w64-x86_64-nsis
            mingw-w64-x86_64-libssh
            mingw-w64-x86_64-libarchive
            mingw-w64-x86_64-eigen3
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-curl

      - name: Toolchain info
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          clang++ --version
          ccache --version
          cmake --version
          ninja --version

      # Key on source hashes — reused across commits, invalidated on real changes
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-win-clang-${{ matrix.build_type }}-${{ hashFiles('src/**/*.cpp', 'src/**/*.hpp', 'CMakeLists.txt') }}
          restore-keys: |
            ccache-win-clang-${{ matrix.build_type }}-
            ccache-win-clang-

      # Include thirdparty hashes so cache invalidates when dependency versions change
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/_deps
          key: fetchcontent-win-${{ hashFiles('CMakeLists.txt', 'thirdparty/**/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-win-
            fetchcontent-

      - name: Configure (CMake)
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cmake -B "$BUILD_DIR" -S "$GITHUB_WORKSPACE" \
            -G "$CMAKE_GENERATOR" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER="$(cygpath -m /mingw64/bin/clang.exe)" \
            -DCMAKE_CXX_COMPILER="$(cygpath -m /mingw64/bin/clang++.exe)" \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH=/mingw64 \
            -DGUI_FRAMEWORK="QT" \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_MESSAGE_LOG_LEVEL=WARNING

      - name: Build
        shell: msys2 {0}
        run: |
          set -o pipefail
          export PATH="/mingw64/bin:$PATH"
          mkdir -p dist/logs
          cmake --build "$BUILD_DIR" --parallel 2>&1 | tee dist/logs/build-${{ matrix.build_type }}.log

      - name: Print ccache stats
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          ccache --show-stats

      - name: Run Code Quality Tools
        if: matrix.build_type == 'Debug' && github.event_name == 'push'
        shell: msys2 {0}
        continue-on-error: true
        run: |
          export PATH="/mingw64/bin:$PATH"
          mkdir -p dist/logs
          echo "Running cppcheck..."
          cppcheck \
            --enable=warning,performance,portability \
            --inline-suppr \
            --suppress=normalCheckLevelMaxBranches \
            --template=gcc \
            -I src \
            src 2>&1 | tee dist/logs/cppcheck.log || true

      - name: Run tests
        id: run-tests
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          mkdir -p dist/test-results
          "${{ env.BUILD_DIR }}/tests/bin/LogViewer_tests.exe" \
            --gtest_output="xml:dist/test-results/results.xml"

      # Annotate PRs with test failures
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always()
        with:
          files: dist/test-results/*.xml
          comment_mode: always
          check_name: "Test Results (Windows clang)"

      - name: Install (staging)
        shell: msys2 {0}
        run: cmake --install "$BUILD_DIR" --config ${{ matrix.build_type }} --prefix "$BUILD_DIR/_staging"

      - name: Package (CPack NSIS)
        shell: msys2 {0}
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cpack -G NSIS -C ${{ matrix.build_type }} --config CPackConfig.cmake

      - name: Upload plugins
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.build_type }}-plugins
          path: ${{ env.BUILD_DIR }}/plugins/*.zip
          if-no-files-found: warn

      - name: Upload tests artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.build_type }}-tests
          path: |
            ${{ env.BUILD_DIR }}\Testing\Temporary\LastTest.log
            ${{ env.BUILD_DIR }}\tests\bin\LogViewer_tests.exe
            dist\test-results\**
          if-no-files-found: ignore

      - name: Upload staging artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.build_type }}-staging
          path: dist/staging/**
          if-no-files-found: ignore

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true  # artifact service is occasionally flaky; build success matters more
        with:
          name: windows-${{ matrix.build_type }}-installer
          path: dist/packages/*.exe
          if-no-files-found: warn

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.build_type }}-logs
          path: dist/logs/**
          if-no-files-found: ignore

      - name: Build summary
        if: always()
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          echo "## Windows Build (clang / ${{ matrix.build_type }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.run-tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ccache stats:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache --show-stats >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
