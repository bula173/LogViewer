name: Windows CI (MSYS2 / clang)

on:
  push:
    branches: [ "main", "qt" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pages: write
  actions: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        gui_framework: [wx, qt]

    env:
      BUILD_DIR: ${{ github.workspace }}\build
      CMAKE_GENERATOR: Ninja
      CCACHE_DIR: ${{ github.workspace }}\.ccache
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      GTEST_COLOR: 1
      GUI_FRAMEWORK: ${{ matrix.gui_framework }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-expat
            mingw-w64-x86_64-gtest
            mingw-w64-x86_64-wxwidgets3.2-msw
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-libtiff
            mingw-w64-x86_64-cppcheck
            mingw-w64-x86_64-nsis

      - name: Toolchain info
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          clang++ --version
          wx-config --version

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-win-clang-${{ matrix.build_type }}-${{ matrix.gui_framework }}-${{ github.sha }}
          restore-keys: |
            ccache-win-clang-${{ matrix.build_type }}-${{ matrix.gui_framework }}-
            ccache-win-clang-${{ matrix.build_type }}-
            ccache-win-clang-

      - name: Configure (CMake)
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          
          # Determine framework-specific settings
          if [ "${{ matrix.gui_framework }}" = "wx" ]; then
            GUI_FRAMEWORK="WX"
            EXTRA_ARGS="-DwxWidgets_CONFIG_EXECUTABLE=/mingw64/bin/wx-config"
          else
            GUI_FRAMEWORK="QT"
            EXTRA_ARGS="-DQt6_DIR=/mingw64/lib/cmake/Qt6"
          fi
          
          cmake -B "$BUILD_DIR-${{ matrix.gui_framework }}" -S "$GITHUB_WORKSPACE" \
                -G "$CMAKE_GENERATOR" \
                -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -DCMAKE_C_COMPILER="$(cygpath -m /mingw64/bin/clang.exe)" \
                -DCMAKE_CXX_COMPILER="$(cygpath -m /mingw64/bin/clang++.exe)" \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DCMAKE_PREFIX_PATH=/mingw64 \
                -DGUI_FRAMEWORK="$GUI_FRAMEWORK" \
                -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                $EXTRA_ARGS

      - name: Build
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cmake --build "$BUILD_DIR-${{ matrix.gui_framework }}" --config ${{ matrix.build_type }}

      - name: Run tests
        shell: msys2 {0}
        working-directory: ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}
        run: |
          export PATH="/mingw64/bin:$PATH"
          ctest -j"$(nproc)" --build-config ${{ matrix.build_type }} --output-on-failure

      - name: Check executable format (Release only)
        if: matrix.build_type == 'Release'
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          if [ "${{ matrix.gui_framework }}" = "qt" ]; then
            EXE_PATH="$BUILD_DIR-${{ matrix.gui_framework }}/dist/Release/LogViewerQt.exe"
          else
            EXE_PATH="$BUILD_DIR-${{ matrix.gui_framework }}/dist/Release/LogViewer.exe"
          fi
          echo "Checking executable: $EXE_PATH"
          file "$EXE_PATH"
          ls -la "$EXE_PATH"

      - name: Install (staging)
        if: matrix.build_type == 'Release'
        shell: msys2 {0}
        run: cmake --install "$BUILD_DIR-${{ matrix.gui_framework }}" --config Release --prefix "$BUILD_DIR-${{ matrix.gui_framework }}/_staging"

      - name: run CPack NSIS directly
        if: matrix.build_type == 'Release'
        shell: msys2 {0}
        working-directory: ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cpack -G NSIS -C Release --config CPackConfig.cmake

      - name: Upload tests artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.build_type }}-${{ matrix.gui_framework }}-tests
          path: |
            ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}\Testing\Temporary\LastTest.log
            ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}\tests\bin\LogViewer_tests.exe
          if-no-files-found: ignore

      - name: Upload staging artifact
        if: matrix.build_type == 'Release'  && always()
        uses: actions/upload-artifact@v4
        with:
            name: windows-Release-${{ matrix.gui_framework }}-staging
            path: ${{ env.BUILD_DIR }}-${{ matrix.gui_framework }}\_staging\**
            if-no-files-found: ignore

      - name: Upload installer artifact
        if: matrix.build_type == 'Release' && always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-Release-${{ matrix.gui_framework }}-installer
          path: |
            ${{ github.workspace }}/dist/packages/*.exe
          if-no-files-found: warn
