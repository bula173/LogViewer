name: Linux CI (gcc/clang)

on:
  push:
    branches: [ "main","qt" ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: linux-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        compiler: [gcc]

    env:
      BUILD_DIR: ${{ github.workspace }}/build
      CMAKE_GENERATOR: Ninja
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      GTEST_COLOR: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            ccache \
            libexpat1-dev \
            cppcheck \
            libssh-dev \
            libarchive-dev \
            zip \
            libeigen3-dev \
            libboost-all-dev \
            libcurl4-openssl-dev \
            ${{ matrix.compiler == 'gcc' && 'g++' || 'clang' }} \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools libqt6opengl6-dev

      - name: Install linuxdeployqt
        run: |
          wget -c -nv "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
          chmod a+x linuxdeployqt-continuous-x86_64.AppImage
          sudo mv linuxdeployqt-continuous-x86_64.AppImage /usr/local/bin/linuxdeployqt

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ccache-linux-${{ matrix.compiler }}-${{ matrix.build_type }}-
            ccache-linux-${{ matrix.compiler }}-
      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/_deps
          key: fetchcontent-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-
      - name: Toolchain info
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            which g++
            g++ --version
          else
            which clang++
            clang++ --version
          fi

      - name: Configure
        run: |
          # Determine compiler
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            CC_COMPILER=gcc
            CXX_COMPILER=g++
          else
            CC_COMPILER=clang
            CXX_COMPILER=clang++
          fi
          
          cmake -B "$BUILD_DIR" -S "$GITHUB_WORKSPACE" \
            -G "$CMAKE_GENERATOR" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=$CC_COMPILER \
            -DCMAKE_CXX_COMPILER=$CXX_COMPILER \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_MESSAGE_LOG_LEVEL=WARNING \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
      - name: Build
        run: |
          mkdir -p dist/logs
          cmake --build "$BUILD_DIR" --config ${{ matrix.build_type }} 2>&1 | tee dist/logs/build-${{ matrix.build_type }}.log

      - name: Run Code Quality Tools
        if: matrix.build_type == 'Debug' && github.event_name == 'push'
        continue-on-error: true
        run: |
          # Ensure logs directory exists
          mkdir -p dist/logs
          
          # Run cppcheck analysis
          echo "Running cppcheck..."
          cppcheck --enable=warning,performance,portability --inline-suppr --suppress=normalCheckLevelMaxBranches \
            --template=gcc -I src -I include src 2>&1 | tee dist/logs/cppcheck.log || true
          
          # Run clang-tidy if available
          if command -v clang-tidy &> /dev/null; then
            echo "Running clang-tidy..."
            find src -name "*.cpp" -o -name "*.h" | xargs clang-tidy -p "$BUILD_DIR" 2>&1 | tee dist/logs/clang-tidy.log || true
          fi

      - name: Run tests
        if: github.event_name == 'push'
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          export PATH="/mingw64/bin:$PATH"
          ./tests/bin/LogViewer_tests.exe

      - name: Install (staging)
        if: matrix.build_type == 'Release'
        run: |
          cmake --install "$BUILD_DIR" --config Release --prefix "$BUILD_DIR/_staging"

      - name: Verify CPack config
        if: matrix.build_type == 'Release'
        run: test -f "$BUILD_DIR/CPackConfig.cmake"

      - name: Package (CPack TGZ)
        if: matrix.build_type == 'Release'
        run: |
          cd "$BUILD_DIR"
          cpack -G TGZ -C Release

      - name: Move packages to dist
        if: matrix.build_type == 'Release'
        run: |
          mkdir -p dist/packages
          find "$BUILD_DIR" -maxdepth 1 -type f \( -name "*.tar.gz" -o -name "*.deb" -o -name "*.rpm" \) -exec mv {} dist/packages/ \;
          ls -lh dist/packages/

      - name: Collect plugins
        if: matrix.build_type == 'Release'
        run: |
          echo "Listing plugins in build directory:"
          ls -lh "$BUILD_DIR/plugins/" || echo "plugins not found"
          echo "Plugin zip files:"
          find "$BUILD_DIR/plugins" -maxdepth 1 -type f -name "*.zip" || echo "No plugin zips found"

      - name: Upload plugins
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.build_type }}-plugins
          path: ${{ env.BUILD_DIR }}/plugins/*.zip
          if-no-files-found: warn

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.build_type }}-artifacts
          path: |
            dist/staging/**
            dist/packages/*.tar.gz
            dist/packages/*.deb
            dist/packages/*.rpm
            ${{ env.BUILD_DIR }}/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.build_type }}-logs
          path: |
            dist/logs/**
          if-no-files-found: ignore
