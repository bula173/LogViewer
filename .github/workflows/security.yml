name: Security

on:
  push:
    branches: [ "main", "qt" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly disclosed vulnerabilities
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # Needed to post dependency review comments on PRs
  security-events: write # Needed to upload SARIF results to GitHub Security tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Dependency Review (PRs only) ───────────────────────────────────────────
  # Blocks PRs that introduce dependencies with known vulnerabilities
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on HIGH or CRITICAL vulnerabilities
          fail-on-severity: high
          # Allow licenses commonly used in open-source C++ projects
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, LGPL-2.1, LGPL-3.0, MPL-2.0, ISC
          comment-summary-in-pr: always

  # ─── CodeQL Static Analysis ─────────────────────────────────────────────────
  # Detects security vulnerabilities and bugs via GitHub's CodeQL engine
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    # Don't block PRs — informational only on non-main branches
    continue-on-error: ${{ github.event_name == 'pull_request' }}

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          # Use extended security queries for more thorough analysis
          queries: security-extended

      - name: Cache and install APT packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            ninja-build libexpat1-dev libarchive-dev libssh-dev zip
            libcurl4-openssl-dev g++ qt6-base-dev qt6-tools-dev libqt6opengl6-dev qt6-charts-dev
          version: 1.1

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-codeql-${{ hashFiles('CMakeLists.txt', 'thirdparty/**/CMakeLists.txt') }}
          restore-keys: fetchcontent-codeql-

      - name: Configure
        run: |
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_MESSAGE_LOG_LEVEL=WARNING

      # CodeQL requires an actual build to trace compilation
      - name: Build (for CodeQL tracing)
        run: cmake --build build --parallel

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"
          upload: true
          output: sarif-results

  # ─── Secret Scanning (push/schedule) ────────────────────────────────────────
  # Checks for accidentally committed secrets (API keys, passwords, etc.)
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for accurate scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional: only for orgs

  # ─── Supply Chain: Verify Action Pinning ────────────────────────────────────
  # Warns when GitHub Actions are using floating tags instead of SHA digests
  action-pinning:
    name: Check Action Pinning
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Check for unpinned actions
        run: |
          echo "Checking for GitHub Actions using floating tags..."
          ISSUES=0

          # Find all workflow files and check for tag-based action references
          # that aren't pinned to a full SHA digest
          while IFS= read -r file; do
            # Match lines like: uses: owner/repo@v1  (but not uses: owner/repo@abc1234...)
            grep -n 'uses:' "$file" | \
              grep -vE 'uses:\s+[a-zA-Z0-9_/-]+@[0-9a-f]{40}' | \
              grep -vE '^\s*#' | \
              while read -r line; do
                echo "⚠️  $file: $line"
                ISSUES=$((ISSUES + 1))
              done
          done < <(find .github/workflows -name "*.yml" -o -name "*.yaml")

          if [ "$ISSUES" -gt 0 ]; then
            echo ""
            echo "Consider pinning actions to full SHA digests for security:"
            echo "  uses: actions/checkout@v4"
            echo "  →"
            echo "  uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4"
            echo ""
            echo "Use https://github.com/renovatebot/renovate or"
            echo "    https://github.com/dependabot to automate pinning updates."
          else
            echo "✅ All actions are pinned to SHA digests"
          fi
          # Informational only — don't fail the build
          exit 0

  # ─── Windows AV / Defender Analysis ────────────────────────────────────────
  # Builds the Windows installer and scans it with Windows Defender + VirusTotal
  # to identify what triggers false-positive detections.
  windows-av-scan:
    name: Windows AV Scan
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
    env:
      HAS_VT_KEY: ${{ secrets.VT_API_KEY != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            base-devel git zip
            mingw-w64-x86_64-toolchain mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
            mingw-w64-x86_64-ccache mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-charts mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-libarchive mingw-w64-x86_64-libssh
            mingw-w64-x86_64-curl mingw-w64-x86_64-nsis

      - name: Build
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cmake -B build -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="$(cygpath -m /mingw64/bin/clang.exe)" \
            -DCMAKE_CXX_COMPILER="$(cygpath -m /mingw64/bin/clang++.exe)" \
            -DCMAKE_PREFIX_PATH=/mingw64 \
            -DGUI_FRAMEWORK=QT \
            -DCMAKE_MESSAGE_LOG_LEVEL=WARNING
          cmake --build build --parallel

      - name: Package NSIS installer
        shell: msys2 {0}
        working-directory: build
        run: |
          export PATH="/mingw64/bin:$PATH"
          cmake --install . --config Release --prefix _staging
          cpack -G NSIS -C Release --config CPackConfig.cmake || true
          # Debug: show what cpack produced (CPack may output to workspace dist/packages/)
          echo "=== All exe files under workspace ==="
          find "$GITHUB_WORKSPACE" -name "*.exe" 2>/dev/null || echo "(none)"
          echo "=== Files in dist (recursive) ==="
          find "$GITHUB_WORKSPACE/dist" -type f 2>/dev/null || echo "(empty)"

      - name: Show binary metadata
        shell: pwsh
        run: |
          Write-Host "=== Files in dist (recursive) ==="
          Get-ChildItem "$env:GITHUB_WORKSPACE\dist" -Recurse -ErrorAction SilentlyContinue | Format-Table FullName, Length, LastWriteTime
          Write-Host ""
          Write-Host "=== Authenticode signature ==="
          Get-ChildItem "$env:GITHUB_WORKSPACE\dist" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            $sig = Get-AuthenticodeSignature $_.FullName
            Write-Host "$($_.Name): Status=$($sig.Status)  Signer=$($sig.SignerCertificate.Subject)"
          }

      - name: Windows Defender — update signatures
        shell: pwsh
        run: |
          Write-Host "Updating Defender signatures..."
          # Update-MpSignature requires admin; use MpCmdRun instead
          & "C:\Program Files\Windows Defender\MpCmdRun.exe" -SignatureUpdate 2>&1 | Write-Host
          $status = Get-MpComputerStatus
          Write-Host "AntivirusSignatureVersion: $($status.AntivirusSignatureVersion)"
          Write-Host "AntivirusSignatureLastUpdated: $($status.AntivirusSignatureLastUpdated)"

      - name: Windows Defender — scan exe
        shell: pwsh
        run: |
          $files = Get-ChildItem "$env:GITHUB_WORKSPACE\dist" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue
          if (-not $files) { Write-Warning "No exe files found under dist\. Skipping scan."; exit 0 }
          foreach ($f in $files) {
            Write-Host "=== Scanning $($f.Name) ==="
            $result = & "C:\Program Files\Windows Defender\MpCmdRun.exe" `
              -Scan -ScanType 3 -File $f.FullName -DisableRemediation 2>&1
            Write-Host $result
            if ($LASTEXITCODE -eq 2) {
              Write-Warning "THREAT DETECTED in $($f.Name)"
              $events = Get-WinEvent -LogName "Microsoft-Windows-Windows Defender/Operational" `
                -MaxEvents 10 -ErrorAction SilentlyContinue |
                Where-Object { $_.Id -in @(1006, 1116, 1117) }
              foreach ($e in $events) {
                Write-Host "Event $($e.Id): $($e.Message)"
              }
            } elseif ($LASTEXITCODE -eq 0) {
              Write-Host "✅ Clean: $($f.Name)"
            } else {
              Write-Host "ℹ️  Exit code $LASTEXITCODE for $($f.Name)"
            }
          }

      - name: VirusTotal scan (optional — requires VT_API_KEY secret)
        if: env.HAS_VT_KEY == 'true'
        shell: pwsh
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          $files = Get-ChildItem "$env:GITHUB_WORKSPACE\dist" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue
          foreach ($f in $files) {
            Write-Host "=== Uploading $($f.Name) to VirusTotal ==="
            $response = Invoke-RestMethod `
              -Uri "https://www.virustotal.com/api/v3/files" `
              -Method POST `
              -Headers @{ "x-apikey" = $env:VT_API_KEY } `
              -Form @{ file = Get-Item $f.FullName }
            $analysisId = $response.data.id
            Write-Host "Analysis ID: $analysisId"
            # Poll until complete (max ~3 min)
            $url = "https://www.virustotal.com/api/v3/analyses/$analysisId"
            $attempts = 0
            do {
              Start-Sleep -Seconds 15
              $analysis = Invoke-RestMethod -Uri $url `
                -Headers @{ "x-apikey" = $env:VT_API_KEY }
              $status = $analysis.data.attributes.status
              $attempts++
              Write-Host "Status: $status (attempt $attempts)"
            } while ($status -ne "completed" -and $attempts -lt 12)

            if ($status -eq "completed") {
              $stats  = $analysis.data.attributes.stats
              $malicious = $stats.malicious
              $suspicious = $stats.suspicious
              $total = ($stats.PSObject.Properties | Measure-Object -Property Value -Sum).Sum
              Write-Host ""
              Write-Host "=== VirusTotal Results for $($f.Name) ==="
              Write-Host "Malicious : $malicious / $total"
              Write-Host "Suspicious: $suspicious / $total"
              Write-Host "Report    : https://www.virustotal.com/gui/file/$($analysis.data.links.item -replace '.*/files/','')"
              # List engines that flagged it
              $results = $analysis.data.attributes.results
              $results.PSObject.Properties |
                Where-Object { $_.Value.category -in @("malicious","suspicious") } |
                ForEach-Object { Write-Host "  [$($_.Value.category)] $($_.Name): $($_.Value.result)" }
            }
          }

      - name: Upload binaries as artifact (for manual analysis)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-av-scan-binaries
          path: ${{ github.workspace }}/dist/**/*.exe
          retention-days: 7
