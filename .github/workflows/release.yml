name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # v1.2.3
      - 'v[0-9]+.[0-9]+.[0-9]+-*'    # v1.2.3-rc1

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true  # Cancel stale runs when tag is force-pushed; only latest run publishes

permissions:
  contents: write   # Required to create GitHub Release and upload assets
  checks: write
  id-token: write   # Required for GitHub OIDC token (Sigstore attestation)
  attestations: write  # Required to write build provenance attestations

jobs:
  # ─── Build all three platforms in parallel ──────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - uses: actions/checkout@v4

      - name: Cache and install APT packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            ninja-build ccache libexpat1-dev libssh-dev libarchive-dev
            zip libcurl4-openssl-dev g++ qt6-base-dev qt6-tools-dev
            qt6-tools-dev-tools libqt6opengl6-dev qt6-charts-dev
          version: 1.1

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-gcc-Release-${{ hashFiles('src/**/*.cpp', 'src/**/*.hpp', 'CMakeLists.txt') }}
          restore-keys: |
            ccache-linux-gcc-Release-
            ccache-linux-gcc-

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/_deps
          key: fetchcontent-linux-${{ hashFiles('CMakeLists.txt', 'thirdparty/**/CMakeLists.txt') }}
          restore-keys: fetchcontent-linux-

      - name: Configure
        run: |
          cmake -B "$BUILD_DIR" -S "$GITHUB_WORKSPACE" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_MESSAGE_LOG_LEVEL=WARNING

      - name: Build
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Run tests
        run: |
          "$BUILD_DIR/tests/bin/LogViewer_tests" \
            --gtest_output="xml:dist/test-results/results.xml"

      - name: Package
        run: |
          cmake --install "$BUILD_DIR" --config Release --prefix "$BUILD_DIR/_staging"
          cd "$BUILD_DIR"
          cpack -G TGZ -C Release
          cpack -G DEB -C Release || true
          mkdir -p $GITHUB_WORKSPACE/dist/packages
          find . -maxdepth 1 \( -name "*.tar.gz" -o -name "*.deb" \) \
            -exec cp {} $GITHUB_WORKSPACE/dist/packages/ \;

      - name: Attest Linux packages (GitHub Sigstore)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/packages/*

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-packages
          path: dist/packages/*
          retention-days: 1

      - name: Upload plugins
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-plugins
          path: ${{ env.BUILD_DIR }}/plugins/*.zip
          if-no-files-found: warn
          retention-days: 1

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      HAS_MACOS_CERT: ${{ secrets.MACOS_CERTIFICATE != '' }}
      HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: brew-${{ runner.os }}-

      - name: Install dependencies
        run: brew install ninja ccache expat libssh libarchive qt curl

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-clang-Release-${{ hashFiles('src/**/*.cpp', 'src/**/*.hpp', 'CMakeLists.txt') }}
          restore-keys: |
            ccache-macos-clang-Release-
            ccache-macos-clang-

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/_deps
          key: fetchcontent-macos-${{ hashFiles('CMakeLists.txt', 'thirdparty/**/CMakeLists.txt') }}
          restore-keys: fetchcontent-macos-

      - name: Configure
        run: |
          cmake -B "$BUILD_DIR" -S "$GITHUB_WORKSPACE" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=/usr/bin/clang \
            -DCMAKE_CXX_COMPILER=/usr/bin/clang++ \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_MESSAGE_LOG_LEVEL=WARNING \
            -DLibArchive_ROOT=$(brew --prefix libarchive) \
            -DCURL_ROOT=$(brew --prefix curl) \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt)

      - name: Build
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Run tests
        run: |
          "$BUILD_DIR/tests/bin/LogViewer_tests" \
            --gtest_output="xml:dist/test-results/results.xml"

      - name: Sign macOS app bundle
        if: env.HAS_MACOS_CERT == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PWD" build.keychain
          rm -f /tmp/certificate.p12
          APP="$BUILD_DIR/src/main/LogViewer.app"
          codesign --deep --force --options runtime \
            --entitlements "$GITHUB_WORKSPACE/packaging/entitlements.plist" \
            --sign "$MACOS_CERTIFICATE_NAME" "$APP"
          codesign --verify --deep --strict "$APP"
          echo "macOS app bundle signed successfully"

      - name: Notarize macOS app bundle
        if: env.HAS_APPLE_ID == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          APP="$BUILD_DIR/src/main/LogViewer.app"
          ditto -c -k --keepParent "$APP" /tmp/LogViewer-notarize.zip
          xcrun notarytool submit /tmp/LogViewer-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$APP"
          rm -f /tmp/LogViewer-notarize.zip
          echo "macOS notarization and stapling complete"

      - name: Package
        run: |
          cmake --install "$BUILD_DIR" --config Release --prefix "$BUILD_DIR/_staging"
          cd "$BUILD_DIR"
          cpack -G TGZ -C Release
          mkdir -p $GITHUB_WORKSPACE/dist/packages
          find . -maxdepth 1 -name "*.tar.gz" -exec cp {} $GITHUB_WORKSPACE/dist/packages/ \;

      - name: Attest macOS packages (GitHub Sigstore)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/packages/*

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-packages
          path: dist/packages/*
          retention-days: 1

      - name: Upload plugins
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-plugins
          path: ${{ env.BUILD_DIR }}/plugins/*.zip
          if-no-files-found: warn
          retention-days: 1

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      BUILD_DIR: ${{ github.workspace }}\build
      CCACHE_DIR: ${{ github.workspace }}\.ccache
      HAS_WIN_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache MSYS2
        uses: actions/cache@v4
        with:
          path: C:\msys64
          key: msys2-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: msys2-

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            base-devel git zip tar
            mingw-w64-x86_64-toolchain mingw-w64-x86_64-clang
            mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
            mingw-w64-x86_64-ccache mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-charts mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-libarchive mingw-w64-x86_64-libssh
            mingw-w64-x86_64-curl mingw-w64-x86_64-nsis

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-win-clang-Release-${{ hashFiles('src/**/*.cpp', 'src/**/*.hpp', 'CMakeLists.txt') }}
          restore-keys: |
            ccache-win-clang-Release-
            ccache-win-clang-

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/_deps
          key: fetchcontent-win-${{ hashFiles('CMakeLists.txt', 'thirdparty/**/CMakeLists.txt') }}
          restore-keys: fetchcontent-win-

      - name: Configure
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cmake -B "$BUILD_DIR" -S "$GITHUB_WORKSPACE" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="$(cygpath -m /mingw64/bin/clang.exe)" \
            -DCMAKE_CXX_COMPILER="$(cygpath -m /mingw64/bin/clang++.exe)" \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH=/mingw64 \
            -DGUI_FRAMEWORK=QT \
            -DCMAKE_MESSAGE_LOG_LEVEL=WARNING

      - name: Build
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cmake --build "$BUILD_DIR" --parallel

      - name: Run tests
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          "$BUILD_DIR/tests/bin/LogViewer_tests.exe"

      - name: Sign Windows executable
        if: env.HAS_WIN_CERT == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("$env:TEMP\certificate.pfx", $certBytes)
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Select-Object -Last 1).FullName
          if (-not $signtool) { throw "signtool.exe not found" }
          $exe = Join-Path $env:BUILD_DIR "src\main\LogViewer.exe"
          & $signtool sign /f "$env:TEMP\certificate.pfx" /p $env:WINDOWS_CERTIFICATE_PWD `
            /tr "http://timestamp.digicert.com" /td sha256 /fd sha256 `
            /d "LogViewer" /du "https://github.com/bula173/LogViewer" $exe
          if ($LASTEXITCODE -ne 0) { throw "signtool failed for executable" }
          Remove-Item "$env:TEMP\certificate.pfx"
          Write-Host "Windows executable signed successfully"

      - name: Package (NSIS installer)
        shell: msys2 {0}
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cmake --install . --config Release --prefix _staging
          cpack -G NSIS -C Release --config CPackConfig.cmake
          mkdir -p $GITHUB_WORKSPACE/dist/packages
          # Only copy the NSIS installer (LogViewer-*-win64.exe), not the raw exe
          find . -maxdepth 1 -name "LogViewer-*-win64.exe" \
            -exec cp {} $GITHUB_WORKSPACE/dist/packages/ \;

      - name: Sign Windows installer
        if: env.HAS_WIN_CERT == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PWD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("$env:TEMP\certificate.pfx", $certBytes)
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Select-Object -Last 1).FullName
          if (-not $signtool) { throw "signtool.exe not found" }
          Get-ChildItem "$env:GITHUB_WORKSPACE\dist\packages\*.exe" | ForEach-Object {
            & $signtool sign /f "$env:TEMP\certificate.pfx" /p $env:WINDOWS_CERTIFICATE_PWD `
              /tr "http://timestamp.digicert.com" /td sha256 /fd sha256 `
              /d "LogViewer Installer" /du "https://github.com/bula173/LogViewer" $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $_" }
          }
          Remove-Item "$env:TEMP\certificate.pfx"
          Write-Host "Windows installer signed successfully"

      - name: Attest Windows packages (GitHub Sigstore)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/packages/*

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-packages
          path: dist/packages/*
          retention-days: 1

      - name: Upload plugins
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-plugins
          path: ${{ env.BUILD_DIR }}/plugins/*.zip
          if-no-files-found: warn
          retention-days: 1

  # ─── Create GitHub Release after all platforms succeed ──────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*

      - name: Display collected assets
        run: find release-assets -type f | sort

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > changelog.md
            git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" \
              --no-merges >> changelog.md
          else
            echo "## Initial Release" > changelog.md
          fi
          echo "" >> changelog.md
          echo "## Supported Platforms" >> changelog.md
          echo "- Linux (x86_64) — DEB + TGZ" >> changelog.md
          echo "- macOS (ARM64) — TGZ" >> changelog.md
          echo "- Windows (x86_64) — NSIS installer" >> changelog.md

      - name: Generate plugins_manifest.json
        run: |
          python3 - <<'PYEOF'
          import json, os, glob

          tag     = os.environ.get("GITHUB_REF_NAME", "v0.0.0")
          version = tag.lstrip("v")
          repo    = "bula173/LogViewer"
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          # Collect unique plugin IDs from uploaded plugin ZIPs
          plugin_ids = set()
          for f in glob.glob("release-assets/release-*-plugins/*.zip"):
              base_name = os.path.basename(f)
              for suffix in ["-linux.zip", "-windows.zip", "-macos.zip"]:
                  if base_name.endswith(suffix):
                      plugin_ids.add(base_name[: -len(suffix)])
                      break

          plugins = []
          for pid in sorted(plugin_ids):
              # Read plugin metadata from source config.json
              cfg_path = f"plugins/{pid}/config.json"
              meta = {}
              if os.path.exists(cfg_path):
                  with open(cfg_path) as fh:
                      meta = json.load(fh)

              # Map platform → download URL
              assets = {}
              sha256_map = {}
              for plat, suffix in [("linux","linux"), ("macos","macos"), ("windows","windows")]:
                  zip_name = f"{pid}-{suffix}.zip"
                  zip_path = f"release-assets/release-{plat}-plugins/{zip_name}"
                  if os.path.exists(zip_path):
                      assets[plat] = f"{base_url}/{zip_name}"
                      import subprocess
                      result = subprocess.run(
                          ["sha256sum", zip_path], capture_output=True, text=True)
                      if result.returncode == 0:
                          sha256_map[plat] = result.stdout.split()[0]

              if not assets:
                  continue

              plugins.append({
                  "id":            pid,
                  "name":          meta.get("name", pid),
                  "version":       meta.get("version", version),
                  "apiVersion":    meta.get("apiVersion", "1.0.0"),
                  "minAppVersion": meta.get("minAppVersion", "1.0.0"),
                  "assets":        assets,
                  "sha256":        sha256_map,
              })

          manifest = {"appVersion": version, "plugins": plugins}
          with open("plugins_manifest.json", "w") as fh:
              json.dump(manifest, fh, indent=2)
          print(f"Manifest generated: {len(plugins)} plugin(s)")
          PYEOF

      - name: Rename plugin ZIPs with platform suffix
        run: |
          mkdir -p staged-plugins
          for plat in linux macos windows; do
            for f in release-assets/release-${plat}-plugins/*.zip; do
              [ -f "$f" ] || continue
              base=$(basename "$f" .zip)
              # Only rename if suffix not already present
              if [[ "$base" != *"-${plat}" ]]; then
                cp "$f" "staged-plugins/${base}-${plat}.zip"
              else
                cp "$f" "staged-plugins/$(basename $f)"
              fi
            done
          done

      - name: Delete existing release if present
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete ${{ github.ref_name }} --yes 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LogViewer ${{ github.ref_name }}
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/**/LogViewer-*.tar.gz
            release-assets/**/LogViewer-*.deb
            release-assets/**/LogViewer-*-win64.exe
            staged-plugins/*.zip
            plugins_manifest.json
          fail_on_unmatched_files: false

      - name: Release summary
        run: |
          echo "## 🚀 Release ${{ github.ref_name }} Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Assets uploaded:**" >> $GITHUB_STEP_SUMMARY
          find release-assets -type f | while read f; do
            size=$(du -sh "$f" | cut -f1)
            echo "- $(basename $f) ($size)" >> $GITHUB_STEP_SUMMARY
          done
