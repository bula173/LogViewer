name: Build Documentation

on:
  push:
    branches: [ "main", "qt", "analysis" ]
    paths:
      - 'docs/**'
      - 'src/**/*.hpp'
      - 'src/**/*.cpp'
      - 'Doxyfile'
      - '.github/workflows/documentation.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**/*.hpp'
      - 'src/**/*.cpp'
      - 'Doxyfile'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-documentation:
    name: Build Documentation with Doxygen
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Doxygen and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
      
      - name: Verify Doxygen installation
        run: |
          doxygen --version
          dot -V
      
      - name: Build Doxygen documentation
        run: |
          doxygen Doxyfile
      
      - name: Check generated documentation
        run: |
          ls -la docs/html/
          echo "Documentation files generated:"
          find docs/html -name "*.html" | wc -l
          echo ""
          echo "Markdown files included:"
          find docs/html -type f -name "*.html" | xargs grep -l "ARCHITECTURE\|DEVELOPMENT\|AI_ANALYSIS" | wc -l
      
      - name: Upload Doxygen HTML
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-documentation
          path: docs/html/
          retention-days: 30
      
      - name: Deploy to GitHub Pages (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/html
          publish_branch: gh-pages
          commit_message: 'Deploy documentation from ${{ github.sha }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
      
      - name: Build summary
        run: |
          echo "## Documentation Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Doxygen documentation built successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Included Content" >> $GITHUB_STEP_SUMMARY
          echo "- API documentation from C++ source code" >> $GITHUB_STEP_SUMMARY
          echo "- Markdown documentation files (*.md)" >> $GITHUB_STEP_SUMMARY
          echo "- Architecture diagrams" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref }}" == "refs/heads/main" ] && [ "${{ github.event_name }}" == "push" ]; then
            echo "### Deployment" >> $GITHUB_STEP_SUMMARY
            echo "📚 Documentation deployed to: https://bula173.github.io/LogViewer/" >> $GITHUB_STEP_SUMMARY
          fi
