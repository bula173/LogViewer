name: Build Documentation

on:
  push:
    branches: [ "main", "qt", "analysis" ]
    paths:
      - 'docs/**'
      - 'src/**/*.hpp'
      - 'src/**/*.cpp'
      - 'Doxyfile'
      - '.github/workflows/documentation.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**/*.hpp'
      - 'src/**/*.cpp'
      - 'Doxyfile'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-doxygen:
    name: Build Doxygen Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Doxygen and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
      
      - name: Verify Doxygen installation
        run: |
          doxygen --version
          dot -V
      
      - name: Build Doxygen documentation
        run: |
          doxygen Doxyfile
      
      - name: Check generated documentation
        run: |
          ls -la docs/html/
          echo "Documentation files generated:"
          find docs/html -name "*.html" | wc -l
      
      - name: Upload Doxygen HTML
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: docs/html/
          retention-days: 30
      
      - name: Deploy to GitHub Pages (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/html
          publish_branch: gh-pages
          commit_message: 'Deploy documentation from ${{ github.sha }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
  
  build-markdown-docs:
    name: Build Markdown Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin
      
      - name: Create MkDocs configuration
        run: |
          cat > mkdocs.yml << 'EOF'
          site_name: LogViewer Documentation
          site_description: A modern log viewer with AI-assisted analysis
          site_author: LogViewer Contributors
          repo_url: https://github.com/bula173/LogViewer
          repo_name: bula173/LogViewer
          
          theme:
            name: material
            palette:
              - scheme: default
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-7
                  name: Switch to dark mode
              - scheme: slate
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-4
                  name: Switch to light mode
            features:
              - navigation.tabs
              - navigation.sections
              - navigation.top
              - search.suggest
              - search.highlight
              - content.code.copy
          
          plugins:
            - search
            - mermaid2
          
          markdown_extensions:
            - admonition
            - pymdownx.details
            - pymdownx.superfences
            - pymdownx.highlight:
                anchor_linenums: true
            - pymdownx.inlinehilite
            - pymdownx.snippets
            - pymdownx.tabbed:
                alternate_style: true
            - tables
            - toc:
                permalink: true
          
          nav:
            - Home: README.md
            - User Guide:
              - Getting Started: docs/DEVELOPMENT.md
              - AI Analysis: docs/AI_ANALYSIS_GUIDE.md
              - UI Guide: docs/UI_IMPROVEMENTS.md
              - Polish Support: docs/POLISH_SUPPORT.md
            - Developer Guide:
              - Architecture: docs/ARCHITECTURE.md
              - Build System: docs/CMAKE_PRESETS_INTEGRATION.md
              - Build Status: docs/BUILD_STATUS.md
              - Development: docs/DEVELOPMENT.md
              - Implementation: docs/IMPLEMENTATION_SUMMARY.md
            - Technical Details:
              - Type Filter: docs/CONFIGURABLE_TYPE_FILTER.md
              - Compiler Warnings: docs/COMPILER_WARNINGS_ANALYSIS.md
              - Build Analysis: docs/BUILD_SYSTEM_ANALYSIS.md
              - Utilities: docs/UTILITIES_INTEGRATION.md
              - Improvements: docs/IMPROVEMENTS.md
              - Warnings Fix: docs/WARNINGS_FIX_SUMMARY.md
            - API Reference: api/index.html
          EOF
      
      - name: Build MkDocs site
        run: |
          mkdocs build --strict --verbose
      
      - name: Upload MkDocs site
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site/
          retention-days: 30
      
      - name: Deploy MkDocs to GitHub Pages (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdocs gh-deploy --force --clean

  documentation-summary:
    name: Documentation Build Summary
    runs-on: ubuntu-latest
    needs: [build-doxygen, build-markdown-docs]
    if: always()
    
    steps:
      - name: Check build status
        run: |
          echo "## Documentation Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Doxygen Documentation" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build-doxygen.result }}" == "success" ]; then
            echo "✅ Doxygen documentation built successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Doxygen documentation build failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Markdown Documentation" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build-markdown-docs.result }}" == "success" ]; then
            echo "✅ Markdown documentation built successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Markdown documentation build failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref }}" == "refs/heads/main" ] && [ "${{ github.event_name }}" == "push" ]; then
            echo "### Deployment" >> $GITHUB_STEP_SUMMARY
            echo "📚 Documentation deployed to: https://bula173.github.io/LogViewer/" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Fail if any build failed
        if: needs.build-doxygen.result != 'success' || needs.build-markdown-docs.result != 'success'
        run: exit 1
